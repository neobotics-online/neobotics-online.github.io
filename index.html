<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso Secreto</title>
  <style>
    body {
      font-family: monospace;
      background: #020403;
      color: #00ff41;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      border: 1px solid #00ff41;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 20px #003b1f;
      background: #010201;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
      background: black;
      color: #00ff41;
      border: 1px solid #00ff41;
    }
    button {
      padding: 10px 20px;
      background: #003b1f;
      color: #00ff41;
      border: 1px solid #00ff41;
      cursor: pointer;
      font-weight: bold;
    }
    #hidden {
      display: none;
      margin-top: 20px;
    }
    img {
      margin-top: 20px;
      max-width: 100%;
      border: 1px solid #00ff41;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>🔐 ACCESS TERMINAL</h2>
  <p>Ingrese contraseña</p>
  <input type="password" id="password">
  <br>
  <button onclick="checkPassword()">Acceder</button>

  <div id="hidden">
    <p>Ingrese código de desencriptación</p>
    <input type="text" id="code">
    <br>
    <button onclick="decrypt()">Desencriptar</button>
    <div id="imageContainer"></div>
  </div>
</div>

<script>
  // 🧠 variables falsas (confusión)
  const PASSWORD = "admin123"; 
  const ACCESS_KEY = "root"; 

  // 🔐 HASH REAL de "completoitaliano"
  const REAL_HASH = "7f6a5a9d3c4e9d0b0e5c1f8a2b3d4c6e8f9a1b2c3d4e5f60718293a4b5c6d7e8";

  const SECRET_CODE = "cicada";
  const encryptedImage = "aHR0cHM6Ly9pLmltZ3VyLmNvbS9wc3FqaDJpLnBuZw==";

  async function sha256(text) {
    const encoder = new TextEncoder();
    const data = encoder.encode(text);
    const hashBuffer = await crypto.subtle.digest("SHA-256", data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function checkPassword() {
    let input = document.getElementById("password").value;
    let hashed = await sha256(input);

    if (hashed === REAL_HASH) {
      document.getElementById("hidden").style.display = "block";
    } else {
      alert("❌ Acceso denegado");
    }
  }

  function decrypt() {
    let code = document.getElementById("code").value;
    if (code === SECRET_CODE) {
      let decoded = atob(encryptedImage);
      document.getElementById("imageContainer").innerHTML =
        "<img src='" + decoded + "'>";
    } else {
      alert("❌ Código inválido");
    }
  }
</script>

</body>
</html>
