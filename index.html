<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Acceso</title>
  <style>
    body {
      font-family: monospace;
      background: #020403;
      color: #00ff41;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .box {
      border: 1px solid #00ff41;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 20px #003b1f;
      background: #010201;
    }
    input {
      padding: 10px;
      margin: 10px;
      width: 80%;
      background: black;
      color: #00ff41;
      border: 1px solid #00ff41;
    }
    button {
      padding: 10px 20px;
      background: #003b1f;
      color: #00ff41;
      border: 1px solid #00ff41;
      cursor: pointer;
      font-weight: bold;
    }
    #hidden {
      display: none;
      margin-top: 20px;
    }
    img {
      margin-top: 20px;
      max-width: 100%;
      border: 1px solid #00ff41;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>ACCESS TERMINAL</h2>
  <p>Ingrese contraseña</p>
  <input type="password" id="password">
  <br>
  <button onclick="checkPassword()">Acceder</button>

  <div id="hidden">
    <p>Ingrese código</p>
    <input type="text" id="code">
    <br>
    <button onclick="decrypt()">Desbloquear</button>
    <div id="imageContainer"></div>
  </div>
</div>

<script>
  const a1 = "admin123";
  const a2 = "root";
  const a3 = "guest";

  const p = "Y29tcGxldG9pdGFsaWFubw==";
  const c = "cicada";
  const i = "aHR0cHM6Ly9pLmltZ3VyLmNvbS9wc3FqaDJpLnBuZw==";

  function checkPassword() {
    let x = document.getElementById("password").value;
    let y = atob(p);
    if (x === y) {
      document.getElementById("hidden").style.display = "block";
    } else {
      alert("Acceso denegado");
    }
  }

  function decrypt() {
    let z = document.getElementById("code").value;
    if (z === c) {
      let d = atob(i);
      document.getElementById("imageContainer").innerHTML =
        "<img src='" + d + "'>";
    } else {
      alert("Código inválido");
    }
  }
</script>

</body>
</html>
